# ─────────────────────────────────────────────────────────────────────────────
# Workflow : Analyse SonarQube + Quality Gate
#
# Équivalent GitLab CI :
#   GitLab → .gitlab-ci.yml avec stages, variables CI/CD, tags pour runner
#   GitHub → .github/workflows/*.yml avec jobs, secrets, runs-on pour runner
#
# Différences clés :
#   | GitLab CI              | GitHub Actions                         |
#   |------------------------|----------------------------------------|
#   | variables (CI/CD)      | secrets (Settings > Secrets > Actions) |
#   | tags: [self-hosted]    | runs-on: self-hosted                   |
#   | stages + jobs          | jobs avec steps                        |
#   | $CI_COMMIT_REF_NAME    | ${{ github.ref_name }}                 |
#   | only/except            | on: push/pull_request avec branches    |
#   | artifacts: paths       | actions/upload-artifact                |
# ─────────────────────────────────────────────────────────────────────────────

name: SonarQube Analysis

# ─── Déclencheurs ─────────────────────────────────────────────────────────────
# GitLab CI : only: [main, develop] / on_merge_request
# GitHub Actions : on.push.branches + on.pull_request.branches
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  sonarqube:
    name: SonarQube Quality Gate

    # ── Runner ──────────────────────────────────────────────────────────────
    # GitLab CI : tags: [self-hosted]  (le runner doit avoir ce tag)
    # GitHub Actions : runs-on: self-hosted
    #
    # On utilise un runner self-hosted car GitHub Actions (runners hébergés)
    # ne peut PAS accéder à http://localhost:9000 sur votre machine Windows.
    # Le self-hosted runner tourne sur votre machine et peut joindre localhost.
    # ────────────────────────────────────────────────────────────────────────
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      # GitLab CI : le checkout est automatique
      # GitHub Actions : il faut l'action actions/checkout explicitement
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → historique complet pour que Sonar calcule
          # correctement le blame et les nouvelles lignes de code
          fetch-depth: 0

      # ── 2. Setup Node.js ──────────────────────────────────────────────────
      # GitLab CI : image: node:22-alpine dans le job ou global
      # GitHub Actions : actions/setup-node (le runner self-hosted doit avoir
      # Node installé OU cette action l'installe via nvm/fnm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Installation des dépendances ───────────────────────────────────
      - name: Installation des dépendances npm
        run: npm ci

      # ── 4. Tests + génération du rapport de coverage ──────────────────────
      # "npm run test:unit -- --coverage" lance Vitest avec le flag coverage
      # Vitest écrit coverage/lcov.info (configuré dans vite.config.ts)
      # GitLab CI : même commande dans le script: du job test
      - name: Tests unitaires avec coverage (Vitest)
        run: npm run test:unit -- --coverage --reporter=verbose
        continue-on-error: true   # Ne bloque pas le pipeline si des tests échouent
        env:
          # Assure un environnement non-interactif pour Vitest
          CI: true

      # ── 5. Cache du binaire SonarScanner CLI ─────────────────────────────
      # Les actions officielles SonarSource (sonarqube-scan-action, quality-gate-action)
      # exécutent des scripts bash via WSL, qui n'est pas disponible sur ce runner Windows.
      # On télécharge directement le ZIP Windows (JRE bundlé) et on le met en cache.
      # GitLab CI : équivalent de l'image Docker sonarsource/sonar-scanner-cli
      - name: Cache SonarScanner CLI
        id: cache-sonar
        uses: actions/cache@v4
        with:
          path: C:\sonar-scanner-cli
          key: sonar-scanner-cli-7.2.0.5079

      # ── 6. Téléchargement SonarScanner CLI (si absent du cache) ──────────
      - name: Téléchargement SonarScanner CLI
        if: steps.cache-sonar.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.2.0.5079-windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile sonar-scanner.zip
          Expand-Archive -Path sonar-scanner.zip -DestinationPath "C:\sonar-scanner-cli" -Force
          Remove-Item sonar-scanner.zip

      # ── 7. Analyse SonarQube + Quality Gate ──────────────────────────────
      # On appelle sonar-scanner.bat directement (pas de bash requis).
      # sonar.qualitygate.wait=true dans sonar-project.properties fait attendre
      # le résultat de la Quality Gate et retourne exit code 1 si elle échoue.
      # L'action sonarqube-quality-gate-action n'est plus nécessaire.
      #
      # GitLab CI :
      #   script:
      #     - sonar-scanner -Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=$SONAR_HOST_URL
      - name: Analyse SonarQube + Quality Gate
        shell: pwsh
        run: |
          $scanner = Get-ChildItem -Path "C:\sonar-scanner-cli" -Filter "sonar-scanner.bat" -Recurse | Select-Object -First 1
          & $scanner.FullName "-Dsonar.token=${{ secrets.SONAR_TOKEN }}" "-Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
