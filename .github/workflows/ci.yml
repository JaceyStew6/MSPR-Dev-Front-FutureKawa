# ─────────────────────────────────────────────────────────────────────────────
# CI/CD - FutureKawa Frontend
#
# Pipeline: build ──► test ──► e2e ──► sonar ──► deploy (main only)
#
# GitLab CI equivalences → GitHub Actions:
#   stages                    → jobs with needs: to enforce order
#   parallel jobs             → jobs with the same needs: (run in parallel)
#   image: sonarsource/...    → docker run in the step (Windows runner)
#   tags: [local]             → runs-on: self-hosted
#   artifacts: paths:         → actions/upload-artifact + download-artifact
#   artifacts: when: always   → if: always() on upload steps
#   allow_failure: false      → default behavior (no continue-on-error)
#   $CI_COMMIT_REF_SLUG       → ${{ github.ref_name }}
#   $CI_PIPELINE_SOURCE       → ${{ github.event_name }}
#   environment: production   → environment: production
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD - FutureKawa Frontend

# ─── Triggers ─────────────────────────────────────────────────────────────────
# GitLab: rules: if $CI_COMMIT_BRANCH == 'main'/'develop'
#              + if $CI_PIPELINE_SOURCE == 'merge_request_event'
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── JOB 1 : BUILD ─────────────────────────────────────────────────────────────
  # GitLab: stage: build → build-job
  # build-only = vite build without vue-tsc (avoids blocking TS errors)
  # The dist/ folder is passed to later jobs via artifact
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: self-hosted

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Build Vite
        run: npm run build-only

      - name: Build upload (dist/)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 1


  # ── JOB 2 : UNIT TESTS ───────────────────────────────────────────────────────
  # GitLab: stage: test → unit-test-job
  # Runs in parallel with lint (same needs: build)
  # continue-on-error on the vitest step: generates coverage/lcov.info even if
  # tests fail. The actual blocking decision is delegated to the SonarQube Quality Gate.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (Vitest)
    runs-on: self-hosted
    needs: build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Unit tests & coverage
        run: npm run test:unit -- --coverage --reporter=verbose
        continue-on-error: true
        env:
          CI: true

      - name: Uploading coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 1


  # ── JOB 3 : E2E TESTS ────────────────────────────────────────────────────────
  # GitLab: stage: test → e2e-job
  # Runs after unit tests pass (needs: test).
  # Uses VITE_MOCK=true via dev:e2e - no real backend required.
  # Chromium only (playwright.config.ts: projects: [chromium]).
  # Reports uploaded even on failure for debugging.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: self-hosted
    needs: [test]
    continue-on-error: true

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7


  # ── JOB 4 : SONARQUBE ANALYSIS ────────────────────────────────────────────────
  # GitLab: stage: sonar → build-sonar (tags: [local])
  # Waits for test to finish.
  # Self-hosted runner required: SonarQube runs on localhost:9000.
  # Scanner via official Docker image (no CLI installation needed on the runner).
  # host.docker.internal: from a Docker container on Windows, points to the host machine localhost → reaches SonarQube on :9000.
  # sonar.qualitygate.wait=true (sonar-project.properties): scanner waits for the result and returns exit code 1 if the Quality Gate fails.
  # JSON reports are uploaded even on failure (if: always()).
  # GitLab: artifacts: when: always
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: self-hosted
    needs: [e2e]
    if: ${{ always() && !cancelled() }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Uploading coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/

      - name: SonarQube Analysis & Quality Gates
        shell: cmd
        run: |
          docker run --rm ^
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} ^
            -e SONAR_HOST_URL=http://host.docker.internal:9000 ^
            -v "%GITHUB_WORKSPACE%:/usr/src" ^
            sonarsource/sonar-scanner-cli:latest

      - name: Uploading Quality Gates report
        if: always()
        shell: cmd
        run: >
          curl -s
          -u "${{ secrets.SONAR_TOKEN }}:"
          "http://localhost:9000/api/qualitygates/project_status?projectKey=futurekawa-frontend"
          -o sonar-report.json

      - name: Uploading SonarQube issues
        if: always()
        shell: cmd
        run: >
          curl -s
          -u "${{ secrets.SONAR_TOKEN }}:"
          "http://localhost:9000/api/issues/search?projectKeys=futurekawa-frontend"
          -o sonar-issues.json

      - name: Uploading SonarQube reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # GitLab : artifacts: name: "sonar-reports-${CI_COMMIT_REF_SLUG}"
          name: sonar-reports-${{ github.ref_name }}-${{ github.run_id }}
          path: |
            sonar-report.json
            sonar-issues.json
          retention-days: 7


  # ── JOB 4 : DEPLOY ───────────────────────────────────────────────────────────
  # GitLab: stage: deploy → deploy-job (environment: production)
  # Triggered only on push to main (not develop, not PRs).
  # GitLab equivalent:
  #   rules:
  #     - if: $CI_COMMIT_BRANCH == 'main'
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deployement
    runs-on: self-hosted
    needs: [sonar, e2e]
    if: github.ref_name == 'main' && github.event_name == 'push' && needs.sonar.result == 'success' && needs.e2e.result == 'success'
    environment: production

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Uploading build
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: App Deployement
        run: echo "Application successfully deployed "
