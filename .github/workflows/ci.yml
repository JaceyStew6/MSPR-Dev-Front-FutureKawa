# ─────────────────────────────────────────────────────────────────────────────
# CI/CD - FutureKawa Frontend
#
# Pipeline :  build ──► test ┐
#                            ├──► sonar ──► deploy (main uniquement)
#                       lint ┘
#
# Équivalences GitLab CI → GitHub Actions :
#   stages                    → jobs avec needs: pour forcer l'ordre
#   jobs en parallèle         → jobs avec le même needs: (tournent en //)
#   image: sonarsource/...    → docker run dans le step (runner Windows)
#   tags: [local]             → runs-on: self-hosted
#   artifacts: paths:         → actions/upload-artifact + download-artifact
#   artifacts: when: always   → if: always() sur les steps upload
#   allow_failure: false      → comportement par défaut (pas de continue-on-error)
#   $CI_COMMIT_REF_SLUG       → ${{ github.ref_name }}
#   $CI_PIPELINE_SOURCE       → ${{ github.event_name }}
#   environment: production   → environment: production
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD - FutureKawa Frontend

# ─── Déclencheurs ─────────────────────────────────────────────────────────────
# GitLab : rules: if $CI_COMMIT_BRANCH == 'main'/'develop'
#               + if $CI_PIPELINE_SOURCE == 'merge_request_event'
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── JOB 1 : BUILD ────────────────────────────────────────────────────────────
  # GitLab : stage: build → build-job
  # build-only = vite build sans vue-tsc (évite les erreurs TS bloquantes)
  # Le dist/ est transmis aux jobs suivants via artifact
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: self-hosted

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Build Vite
        run: npm run build-only

      - name: Build upload (dist/)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 1


  # ── JOB 2 : TESTS UNITAIRES ──────────────────────────────────────────────────
  # GitLab : stage: test → unit-test-job
  # Tourne en parallèle avec lint (même needs: build)
  # continue-on-error sur le step vitest : génère coverage/lcov.info même si
  # des tests échouent. Le vrai bloquage est délégué à la Quality Gate SonarQube.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (Vitest)
    runs-on: self-hosted
    needs: build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Unit tests & coverage
        run: npm run test:unit -- --coverage --reporter=verbose
        continue-on-error: true
        env:
          CI: true

      - name: Uploading coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 1


  # ── JOB 3 : LINT ─────────────────────────────────────────────────────────────
  # GitLab : stage: test → lint-test-job
  # Tourne en parallèle avec test (même needs: build)
  # npm run lint enchaîne oxlint puis eslint (défini dans package.json)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (oxlint & ESLint)
    runs-on: self-hosted
    needs: build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Lint (oxlint & ESLint)
        run: npm run lint


  # ── JOB 4 : ANALYSE SONARQUBE ────────────────────────────────────────────────
  # GitLab : stage: sonar → build-sonar (tags: [local])
  # Attend que test ET lint soient terminés.
  # Runner self-hosted requis : SonarQube tourne sur localhost:9000.
  # Scanner via image Docker officielle (pas de CLI à installer sur le runner).
  # host.docker.internal : depuis un conteneur Docker sur Windows, pointe
  #   vers le localhost de la machine hôte → atteint SonarQube sur :9000.
  # sonar.qualitygate.wait=true (sonar-project.properties) : le scanner attend
  #   le résultat et retourne exit code 1 si la Quality Gate échoue.
  # Les rapports JSON sont uploadés même en cas d'échec (if: always()).
  # GitLab : artifacts: when: always
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: self-hosted
    needs: [test, lint]

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm packages installation
        run: npm ci

      - name: Uploading coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/

      - name: SonarQube Analysis & Quality Gates
        shell: cmd
        run: |
          docker run --rm ^
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} ^
            -e SONAR_HOST_URL=http://host.docker.internal:9000 ^
            -v "%GITHUB_WORKSPACE%:/usr/src" ^
            sonarsource/sonar-scanner-cli:latest

      - name: Uploading Quality Gates report
        if: always()
        shell: cmd
        run: >
          curl -s
          -u "${{ secrets.SONAR_TOKEN }}:"
          "http://localhost:9000/api/qualitygates/project_status?projectKey=futurekawa-frontend"
          -o sonar-report.json

      - name: Uploading SonarQube issues
        if: always()
        shell: cmd
        run: >
          curl -s
          -u "${{ secrets.SONAR_TOKEN }}:"
          "http://localhost:9000/api/issues/search?projectKeys=futurekawa-frontend"
          -o sonar-issues.json

      - name: Uploading SonarQube reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # GitLab : artifacts: name: "sonar-reports-${CI_COMMIT_REF_SLUG}"
          name: sonar-reports-${{ github.ref_name }}-${{ github.run_id }}
          path: |
            sonar-report.json
            sonar-issues.json
          retention-days: 7


  # ── JOB 5 : DEPLOY ───────────────────────────────────────────────────────────
  # GitLab : stage: deploy → deploy-job (environment: production)
  # Déclenché uniquement sur push vers main (pas develop, pas PRs).
  # GitLab équivalent :
  #   rules:
  #     - if: $CI_COMMIT_BRANCH == 'main'
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deployement
    runs-on: self-hosted
    needs: sonar
    if: github.ref_name == 'main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Uploading build
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: App Deployement
        run: echo "Application successfully deployed "
