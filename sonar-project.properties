# ─────────────────────────────────────────────────────────────────────────────
# Identification du projet
# GitLab CI : sonar.projectKey se positionne souvent en CLI (-Dsonar.projectKey=)
# GitHub Actions : on le pose ici pour ne pas le répéter dans le workflow YAML
# ─────────────────────────────────────────────────────────────────────────────
sonar.projectKey=futurekawa-frontend
sonar.projectName=FutureKawa Frontend
sonar.projectVersion=1.0

# ─────────────────────────────────────────────────────────────────────────────
# Sources et tests
# ─────────────────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts,src/**/__tests__/**

# ─────────────────────────────────────────────────────────────────────────────
# Exclusions (node_modules, dist, assets binaires, fichiers de config)
# ─────────────────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  src/assets/**,\
  src/main.ts

sonar.test.exclusions=**/node_modules/**

# ─────────────────────────────────────────────────────────────────────────────
# Encodage
# ─────────────────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─────────────────────────────────────────────────────────────────────────────
# Coverage - chemin vers le rapport lcov généré par Vitest (provider v8)
# Vitest écrit le fichier dans coverage/lcov.info (cf. vite.config.ts)
# GitLab CI : même propriété, mais souvent passée en -D dans le script CI
# ─────────────────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─────────────────────────────────────────────────────────────────────────────
# Quality Gate - attend le résultat et fait échouer le scanner si KO
# GitLab CI : équivalent de "sonar-scanner ... -Dsonar.qualitygate.wait=true"
# GitHub Actions : ce flag permet au job de retourner exit code 1 si la QG échoue
# ─────────────────────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true
