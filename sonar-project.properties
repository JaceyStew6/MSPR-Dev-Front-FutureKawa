# ─────────────────────────────────────────────────────────────────────────────
# Project identification
# GitLab CI: sonar.projectKey is often set in CLI (-Dsonar.projectKey=)
# GitHub Actions: set it here to avoid repeating it in the workflow YAML
# ─────────────────────────────────────────────────────────────────────────────
sonar.projectKey=futurekawa-frontend
sonar.projectName=FutureKawa Frontend
sonar.projectVersion=1.0

# ─────────────────────────────────────────────────────────────────────────────
# Sources and tests
# ─────────────────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts,src/**/__tests__/**

# ─────────────────────────────────────────────────────────────────────────────
# Exclusions (node_modules, dist, binary assets, config files)
# ─────────────────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  src/assets/**,\
  src/types/**,\
  src/main.ts
  src/App.vue

sonar.test.exclusions=**/node_modules/**

sonar.coverage.exclusions=src/App.vue,src/main.ts

# ─────────────────────────────────────────────────────────────────────────────
# Encoding
# ─────────────────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─────────────────────────────────────────────────────────────────────────────
# Coverage - path to the lcov report generated by Vitest (v8 provider)
# Vitest writes the file to coverage/lcov.info (see vite.config.ts)
# GitLab CI: same property, but often passed with -D in the CI script
# ─────────────────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─────────────────────────────────────────────────────────────────────────────
# Quality Gate - waits for the result and fails the scanner if NOK
# GitLab CI: equivalent to "sonar-scanner ... -Dsonar.qualitygate.wait=true"
# GitHub Actions: this flag allows the job to return exit code 1 if the QG fails
# ─────────────────────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true
